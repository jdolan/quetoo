// /etc/quetoo-dedicated/default.cfg
// Quetoo dedicated server instance configuration.
//
// Each non-blank, non-comment line is prepended with + and passed verbatim
// to quetoo-dedicated, so any valid console command works here.
//
// To add a server instance, copy this file (e.g. ctf.cfg):
//   cp /etc/quetoo-dedicated/default.cfg /etc/quetoo-dedicated/ctf.cfg
//   service quetoo-dedicated start ctf
//
// See https://quetoo.org/docs/server-admin for available cvars.

set net_port 1998
set sv_hostname "Quetoo Server"
set sv_public 1
