name: Release

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: write

jobs:
  resolve-deps:
    runs-on: ubuntu-latest
    outputs:
      objectively-sha: ${{ steps.resolve.outputs.objectively-sha }}
      objectivelymvc-sha: ${{ steps.resolve.outputs.objectivelymvc-sha }}
    steps:
    - name: Resolve dependency versions
      id: resolve
      run: |
        echo "objectively-sha=$(git ls-remote https://github.com/jdolan/Objectively.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
        echo "objectivelymvc-sha=$(git ls-remote https://github.com/jdolan/ObjectivelyMVC.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

  build-macos:
    needs: resolve-deps
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            build: arm64-apple-darwin

    runs-on: ${{ matrix.runner }}

    env:
      HOMEBREW_PREFIX: ${{ matrix.arch == 'arm64' && '/opt/homebrew' || '/usr/local' }}

    steps:
    - name: Install dependencies
      run: |
        brew update
        brew install \
          autoconf automake libtool pkg-config \
          glib ncurses check \
          sdl3 sdl3_image sdl3_ttf \
          openal-soft libsndfile physfs \
          curl dylibbundler

    - name: Cache Objectively and ObjectivelyMVC
      id: cache-deps
      uses: actions/cache@v5
      with:
        path: /usr/local
        key: macos-deps-${{ matrix.arch }}-${{ needs.resolve-deps.outputs.objectively-sha }}-${{ needs.resolve-deps.outputs.objectivelymvc-sha }}

    - name: Checkout Objectively
      if: steps.cache-deps.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Build Objectively
      if: steps.cache-deps.outputs.cache-hit != 'true'
      working-directory: Objectively
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Checkout ObjectivelyMVC
      if: steps.cache-deps.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyMVC
        path: ObjectivelyMVC

    - name: Build ObjectivelyMVC
      if: steps.cache-deps.outputs.cache-hit != 'true'
      working-directory: ObjectivelyMVC
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/openal-soft/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Checkout Quetoo
      uses: actions/checkout@v6
      with:
        path: quetoo
        fetch-depth: 0

    - name: Build Quetoo
      working-directory: quetoo
      run: |
        autoreconf -i
        ./configure --with-version=$(git rev-list --count HEAD) CFLAGS='-g -O2' --with-homebrew=${HOMEBREW_PREFIX} --prefix=/
        make -j$(sysctl -n hw.logicalcpu)

    - name: Install Quetoo
      working-directory: quetoo
      run: |
        install -d apple/target/Quetoo.app
        cp -r apple/Quetoo.app/* apple/target/Quetoo.app/
        find apple/target/Quetoo.app -name .turd -delete
        ln -f -s Contents/MacOS apple/target/Quetoo.app/bin
        ln -f -s Contents/MacOS/lib apple/target/Quetoo.app/lib
        ln -f -s Contents/Resources apple/target/Quetoo.app/share
        make DESTDIR=$(pwd)/apple/target/Quetoo.app install
        rm -f apple/target/Quetoo.app/bin apple/target/Quetoo.app/lib apple/target/Quetoo.app/share

    - name: Bundle libraries
      working-directory: quetoo
      run: |
        dylibbundler -b \
          -x apple/target/Quetoo.app/Contents/MacOS/quemap \
          -x apple/target/Quetoo.app/Contents/MacOS/quetoo \
          -x apple/target/Quetoo.app/Contents/MacOS/quetoo-dedicated \
          -x apple/target/Quetoo.app/Contents/MacOS/quetoo-master \
          -x apple/target/Quetoo.app/Contents/MacOS/lib/quetoo/default/cgame.so \
          -x apple/target/Quetoo.app/Contents/MacOS/lib/quetoo/default/game.so \
          -d apple/target/Quetoo.app/Contents/MacOS/lib \
          -of -p @executable_path/lib

    - name: Create archive
      working-directory: quetoo
      run: |
        cd apple/target
        zip -r ../../quetoo-${{ matrix.build }}.zip Quetoo.app

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: quetoo-${{ matrix.build }}
        path: quetoo/quetoo-${{ matrix.build }}.zip

  build-linux:
    needs: resolve-deps
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            build: x86_64-pc-linux
          - runner: ubuntu-22.04-arm
            build: aarch64-pc-linux

    runs-on: ${{ matrix.runner }}

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool pkg-config \
          libncurses-dev \
          libpcre2-dev libffi-dev \
          libopenal-dev libsndfile1-dev libphysfs-dev zlib1g-dev \
          libcurl4-openssl-dev \
          libgl-dev \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
          libxfixes-dev libxss-dev libxtst-dev libwayland-dev libxkbcommon-dev \
          libdrm-dev libgbm-dev libdecor-0-dev libasound2-dev \
          libfreetype-dev libharfbuzz-dev \
          check \
          cmake ninja-build python3-pip \
          imagemagick \
          ruby ruby-dev rubygems rpm
        sudo pip3 install meson
        sudo gem install fpm --no-document

    - name: Build GLib
      run: |
        curl -fsSL -o glib-2.88.0.tar.xz https://download.gnome.org/sources/glib/2.88/glib-2.88.0.tar.xz
        tar -xf glib-2.88.0.tar.xz
        meson setup glib-2.88.0/_build glib-2.88.0 \
          --prefix=/usr/local \
          --buildtype=release \
          -Dtests=false \
          -Dintrospection=disabled \
          -Ddocumentation=false
        ninja -C glib-2.88.0/_build -j$(nproc)
        sudo ninja -C glib-2.88.0/_build install

    - name: Build SDL3
      run: |
        git clone --depth 1 --branch release-3.4.2 https://github.com/libsdl-org/SDL.git SDL3
        cmake -S SDL3 -B SDL3/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3/build -j$(nproc)
        sudo cmake --install SDL3/build

    - name: Build SDL3_image
      run: |
        git clone --depth 1 --branch release-3.4.0 https://github.com/libsdl-org/SDL_image.git SDL3_image
        cmake -S SDL3_image -B SDL3_image/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3_image/build -j$(nproc)
        sudo cmake --install SDL3_image/build

    - name: Build SDL3_ttf
      run: |
        git clone --depth 1 --branch release-3.2.2 https://github.com/libsdl-org/SDL_ttf.git SDL3_ttf
        cmake -S SDL3_ttf -B SDL3_ttf/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3_ttf/build -j$(nproc)
        sudo cmake --install SDL3_ttf/build

    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Build Objectively
      working-directory: Objectively
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyMVC
        path: ObjectivelyMVC

    - name: Build ObjectivelyMVC
      working-directory: ObjectivelyMVC
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Refresh shared library cache
      run: sudo ldconfig

    - name: Checkout Quetoo
      uses: actions/checkout@v6
      with:
        path: quetoo
        fetch-depth: 0

    - name: Build Quetoo
      working-directory: quetoo
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure --with-version=$(git rev-list --count HEAD) CFLAGS='-g -O2' LDFLAGS='-Wl,-rpath=XORIGIN/../lib' --prefix=/
        make -j$(nproc)

    - name: Package Quetoo
      working-directory: quetoo/linux
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        make archive deb rpm VERSION=${GITHUB_REF_NAME#v}

    - name: Upload archive artifact
      uses: actions/upload-artifact@v6
      with:
        name: quetoo-${{ matrix.build }}-archive
        path: quetoo/linux/target/quetoo-${{ matrix.build }}.tar.gz

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v6
      with:
        name: quetoo-${{ matrix.build }}-deb
        path: quetoo/linux/target/quetoo_*.deb

    - name: Upload .rpm artifact
      uses: actions/upload-artifact@v6
      with:
        name: quetoo-${{ matrix.build }}-rpm
        path: quetoo/linux/target/quetoo-*.rpm

  build-windows:
    needs: resolve-deps
    runs-on: windows-latest

    env:
      SOLUTION_FILE_PATH: Quetoo.vs15/quetoo_all.sln
      BUILD_CONFIGURATION: Release

    steps:
    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyMVC
        path: ObjectivelyMVC

    - name: Checkout Quetoo
      uses: actions/checkout@v6
      with:
        path: quetoo
        fetch-depth: 0

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Cache vcpkg installed packages
      id: cache-vcpkg
      uses: actions/cache@v5
      with:
        path: C:\vcpkg\installed
        key: vcpkg-x64-windows-glib-2.88.0

    - name: Install vcpkg packages
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: vcpkg install glib:x64-windows

    - name: Restore NuGet packages
      working-directory: ${{ github.workspace }}/quetoo
      run: nuget restore ${{ env.SOLUTION_FILE_PATH }}

    - name: Build
      working-directory: ${{ github.workspace }}/quetoo
      shell: pwsh
      run: |
        $version = (git rev-list --count HEAD).Trim()
        msbuild /m /p:Configuration=$env:BUILD_CONFIGURATION "/p:ExtraPreprocessorDefinitions=VERSION=`"$version`"" $env:SOLUTION_FILE_PATH

    - name: Install Quetoo
      working-directory: ${{ github.workspace }}/quetoo
      run: |
        $staging = "windows\target\quetoo"

        New-Item -ItemType Directory -Force -Path "$staging\bin" | Out-Null
        New-Item -ItemType Directory -Force -Path "$staging\lib\default\shaders" | Out-Null
        New-Item -ItemType Directory -Force -Path "$staging\lib\default\ui" | Out-Null

        # Executables
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo.exe" "$staging\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quemap.exe" "$staging\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo-dedicated.exe" "$staging\bin\"

        # Game modules
        Copy-Item "Quetoo.vs15\bin\x64Release\cgame.dll" "$staging\lib\default\"
        Copy-Item "Quetoo.vs15\bin\x64Release\game.dll" "$staging\lib\default\"

        # Objectively and ObjectivelyMVC
        Copy-Item "..\Objectively\Objectively.vs15\bin\x64Release\Objectively.dll" "$staging\bin\"
        Copy-Item "..\ObjectivelyMVC\ObjectivelyMVC.vs15\bin\x64Release\ObjectivelyMVC.dll" "$staging\bin\"

        # Dependency DLLs
        Copy-Item "..\Objectively\Objectively.vs15\libs\dlfcn\x64\dlfcn.dll" "$staging\bin\"
        Copy-Item "Quetoo.vs15\libs\openal\bin\x64\OpenAL32.dll" "$staging\bin\"

        # GLib and its dependencies from vcpkg
        $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
        Copy-Item "$vcpkgBin\glib-2.0-0.dll" "$staging\bin\"
        Copy-Item "$vcpkgBin\intl-8.dll" "$staging\bin\"
        Copy-Item "$vcpkgBin\iconv-2.dll" "$staging\bin\"
        Copy-Item "$vcpkgBin\pcre2-8.dll" "$staging\bin\"

        # SDL3 DLLs
        Get-ChildItem "..\ObjectivelyMVC\ObjectivelyMVC.vs15\libs\sdl\lib\x64\*.dll" -ErrorAction SilentlyContinue |
          Copy-Item -Destination "$staging\bin\"

        # Shaders
        Copy-Item -Path "src\client\renderer\shaders\*" -Destination "$staging\lib\default\shaders\" -Recurse

        # UI files (CSS, JSON, PNG and WAV assets, preserving directory structure)
        foreach ($uiSource in @("src\cgame\default\ui", "src\client\ui")) {
          Get-ChildItem -Path $uiSource -Include "*.css","*.json","*.png","*.wav" -Recurse | ForEach-Object {
            $relativePath = $_.FullName.Substring((Resolve-Path $uiSource).Path.Length).TrimStart('\')
            $destPath = Join-Path "$staging\lib\default\ui" $relativePath
            $destDir = Split-Path $destPath -Parent
            if (-not (Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force | Out-Null }
            Copy-Item $_.FullName -Destination $destPath
          }
        }

    - name: Create archive
      working-directory: ${{ github.workspace }}/quetoo
      run: |
        Compress-Archive -Path windows\target\quetoo\* -DestinationPath quetoo-x86_64-pc-windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: quetoo-x86_64-pc-windows
        path: quetoo/quetoo-x86_64-pc-windows.zip

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v6

    - name: Publish version to S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
      run: |
        git rev-list --count HEAD > version
        aws s3 cp version s3://quetoo/version

    - name: Checkout quetoo-data
      uses: actions/checkout@v6
      with:
        repository: jdolan/quetoo-data
        path: quetoo-data
        fetch-depth: 1
        sparse-checkout: target

    - name: Create bundles
      run: |
        # macOS bundle: data into Quetoo.app/Contents/Resources/default/
        mkdir bundle-macos && cd bundle-macos
        unzip ../quetoo-arm64-apple-darwin/quetoo-arm64-apple-darwin.zip
        mkdir -p Quetoo.app/Contents/Resources/default
        cp -r ../quetoo-data/target/default/. Quetoo.app/Contents/Resources/default/
        zip -r ../quetoo-bundle-arm64-apple-darwin.zip Quetoo.app
        cd ..

        # Linux bundle: extract archive, inject data into quetoo/share/quetoo/default/, repack
        mkdir -p quetoo-bundle-linux-x86_64
        tar xzf quetoo-x86_64-pc-linux-archive/quetoo-x86_64-pc-linux.tar.gz -C quetoo-bundle-linux-x86_64
        mkdir -p quetoo-bundle-linux-x86_64/quetoo/share/quetoo/default
        cp -r quetoo-data/target/default/. quetoo-bundle-linux-x86_64/quetoo/share/quetoo/default/
        tar czf quetoo-bundle-x86_64-pc-linux.tar.gz -C quetoo-bundle-linux-x86_64 quetoo/

        mkdir -p quetoo-bundle-linux-aarch64
        tar xzf quetoo-aarch64-pc-linux-archive/quetoo-aarch64-pc-linux.tar.gz -C quetoo-bundle-linux-aarch64
        mkdir -p quetoo-bundle-linux-aarch64/quetoo/share/quetoo/default
        cp -r quetoo-data/target/default/. quetoo-bundle-linux-aarch64/quetoo/share/quetoo/default/
        tar czf quetoo-bundle-aarch64-pc-linux.tar.gz -C quetoo-bundle-linux-aarch64 quetoo/

        # Windows bundle: data as share/default/ alongside bin/ and lib/
        mkdir bundle-windows && cd bundle-windows
        unzip ../quetoo-x86_64-pc-windows/quetoo-x86_64-pc-windows.zip
        mkdir -p share/default
        cp -r ../quetoo-data/target/default/. share/default/
        zip -r ../quetoo-bundle-x86_64-pc-windows.zip .
        cd ..

    - name: Create versioned release
      run: |
        cp quetoo-x86_64-pc-linux-deb/quetoo_*_amd64.deb quetoo-x86_64-pc-linux-deb/quetoo-x86_64-pc-linux.deb
        cp quetoo-x86_64-pc-linux-rpm/quetoo-*.x86_64.rpm quetoo-x86_64-pc-linux-rpm/quetoo-x86_64-pc-linux.rpm
        cp quetoo-aarch64-pc-linux-deb/quetoo_*_arm64.deb quetoo-aarch64-pc-linux-deb/quetoo-aarch64-pc-linux.deb
        cp quetoo-aarch64-pc-linux-rpm/quetoo-*.aarch64.rpm quetoo-aarch64-pc-linux-rpm/quetoo-aarch64-pc-linux.rpm
        gh release create ${{ github.ref_name }} \
          --title "Quetoo ${{ github.ref_name }}" \
          --notes "Quetoo ${{ github.ref_name }}

        ### Bundles (binaries + game data, ready to play)
        | Platform | Download |
        |----------|----------|
        | macOS (Apple Silicon) | quetoo-bundle-arm64-apple-darwin.zip |
        | Linux (x86_64 archive) | quetoo-bundle-x86_64-pc-linux.tar.gz |
        | Linux (arm64 archive) | quetoo-bundle-aarch64-pc-linux.tar.gz |
        | Windows (x86_64) | quetoo-bundle-x86_64-pc-windows.zip |

        ### Binaries only (for updates)
        | Platform | Download |
        |----------|----------|
        | macOS (Apple Silicon) | quetoo-arm64-apple-darwin.zip |
        | Linux (x86_64 archive) | quetoo-x86_64-pc-linux.tar.gz |
        | Linux (x86_64 .deb) | quetoo-x86_64-pc-linux.deb |
        | Linux (x86_64 .rpm) | quetoo-x86_64-pc-linux.rpm |
        | Linux (arm64 archive) | quetoo-aarch64-pc-linux.tar.gz |
        | Linux (arm64 .deb) | quetoo-aarch64-pc-linux.deb |
        | Linux (arm64 .rpm) | quetoo-aarch64-pc-linux.rpm |
        | Windows (x86_64) | quetoo-x86_64-pc-windows.zip |

        For Linux package-managed installs, also install the matching [quetoo-data ${{ github.ref_name }}](https://github.com/jdolan/quetoo-data/releases/tag/${{ github.ref_name }}) release." \
          quetoo-bundle-arm64-apple-darwin.zip \
          quetoo-bundle-x86_64-pc-linux.tar.gz \
          quetoo-bundle-aarch64-pc-linux.tar.gz \
          quetoo-bundle-x86_64-pc-windows.zip \
          quetoo-arm64-apple-darwin/quetoo-arm64-apple-darwin.zip \
          quetoo-x86_64-pc-linux-archive/quetoo-x86_64-pc-linux.tar.gz \
          quetoo-x86_64-pc-linux-deb/quetoo-x86_64-pc-linux.deb \
          quetoo-x86_64-pc-linux-rpm/quetoo-x86_64-pc-linux.rpm \
          quetoo-aarch64-pc-linux-archive/quetoo-aarch64-pc-linux.tar.gz \
          quetoo-aarch64-pc-linux-deb/quetoo-aarch64-pc-linux.deb \
          quetoo-aarch64-pc-linux-rpm/quetoo-aarch64-pc-linux.rpm \
          quetoo-x86_64-pc-windows/quetoo-x86_64-pc-windows.zip
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
