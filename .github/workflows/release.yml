name: Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.0.2)'
        required: true

permissions:
  contents: write

jobs:
  resolve-deps:
    runs-on: ubuntu-latest
    outputs:
      objectively-sha: ${{ steps.resolve.outputs.objectively-sha }}
      objectivelymvc-sha: ${{ steps.resolve.outputs.objectivelymvc-sha }}
    steps:
    - name: Resolve dependency versions
      id: resolve
      run: |
        echo "objectively-sha=$(git ls-remote https://github.com/jdolan/Objectively.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
        echo "objectivelymvc-sha=$(git ls-remote https://github.com/jdolan/ObjectivelyMVC.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

  build-macos:
    needs: resolve-deps
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            build: arm64-apple-darwin
          - runner: macos-15-large
            arch: x86_64
            build: x86_64-apple-darwin

    runs-on: ${{ matrix.runner }}

    env:
      HOMEBREW_PREFIX: ${{ matrix.arch == 'arm64' && '/opt/homebrew' || '/usr/local' }}

    steps:
    - name: Install dependencies
      run: |
        brew update
        brew install --quiet \
          autoconf automake libtool pkg-config \
          glib ncurses check \
          sdl3 sdl3_image sdl3_ttf \
          openal-soft libsndfile physfs \
          curl dylibbundler

    - name: Cache Objectively and ObjectivelyMVC
      id: cache-deps
      uses: actions/cache@v5
      with:
        path: /usr/local
        key: macos-deps-${{ matrix.arch }}-${{ needs.resolve-deps.outputs.objectively-sha }}-${{ needs.resolve-deps.outputs.objectivelymvc-sha }}

    - name: Checkout Objectively
      if: steps.cache-deps.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Build Objectively
      if: steps.cache-deps.outputs.cache-hit != 'true'
      working-directory: Objectively
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Checkout ObjectivelyMVC
      if: steps.cache-deps.outputs.cache-hit != 'true'
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyMVC
        path: ObjectivelyMVC

    - name: Build ObjectivelyMVC
      if: steps.cache-deps.outputs.cache-hit != 'true'
      working-directory: ObjectivelyMVC
      run: |
        export CFLAGS="-I${HOMEBREW_PREFIX}/include"
        export LDFLAGS="-L${HOMEBREW_PREFIX}/lib"
        export PKG_CONFIG_PATH="${HOMEBREW_PREFIX}/lib/pkgconfig:${HOMEBREW_PREFIX}/opt/openal-soft/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(sysctl -n hw.logicalcpu)
        sudo make install

    - name: Checkout Quetoo
      uses: actions/checkout@v6
      with:
        path: quetoo
        fetch-depth: 0

    - name: Build Quetoo
      working-directory: quetoo
      run: |
        autoreconf -i
        ./configure --with-version=$(git rev-list --count HEAD) CFLAGS='-g -O2' --with-homebrew=${HOMEBREW_PREFIX} --prefix=/
        make -j$(sysctl -n hw.logicalcpu)

    - name: Install Quetoo
      working-directory: quetoo
      run: make -C apple pre-install install

    - name: Bundle libraries
      working-directory: quetoo
      run: make -C apple install-lib

    - name: Move engine assets to Resources
      working-directory: quetoo
      run: make -C apple move-resources

    - name: Create archive
      working-directory: quetoo
      run: |
        cd apple/target
        zip -r ../../quetoo-${{ matrix.build }}.zip Quetoo.app

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-${{ matrix.build }}
        path: quetoo/quetoo-${{ matrix.build }}.zip

  lipo-macos:
    needs: build-macos
    runs-on: macos-15

    steps:
    - name: Download arm64 artifact
      uses: actions/download-artifact@v8
      with:
        name: quetoo-arm64-apple-darwin

    - name: Download x86_64 artifact
      uses: actions/download-artifact@v8
      with:
        name: quetoo-x86_64-apple-darwin

    - name: Create universal binary
      run: |
        mkdir arm64 x86_64
        unzip quetoo-arm64-apple-darwin.zip -d arm64
        unzip quetoo-x86_64-apple-darwin.zip -d x86_64

        find arm64/Quetoo.app -type f | while read -r f; do
          if ! file "$f" | grep -q "Mach-O"; then
            continue
          fi
          x86="x86_64/${f#arm64/}"
          if [ -f "$x86" ]; then
            lipo -create "$f" "$x86" -output "$f"
          fi
        done

    - name: Checkout Quetoo
      uses: actions/checkout@v6
      with:
        path: quetoo
        fetch-depth: 1

    - name: Set up keychain
      env:
        APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      run: |
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
        echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
        echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        rm certificate.p12

    - name: Sign application
      run: make -C quetoo/apple sign INSTALL=$(pwd)/arm64/Quetoo.app

    - name: Create binary DMG
      run: make -C quetoo/apple dmg INSTALL=$(pwd)/arm64/Quetoo.app \
             SNAPSHOT=$(pwd)/quetoo-universal-apple-darwin.dmg

    - name: Notarize binary DMG
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: make -C quetoo/apple notarize INSTALL=$(pwd)/arm64/Quetoo.app \
             SNAPSHOT=$(pwd)/quetoo-universal-apple-darwin.dmg

    - name: Checkout quetoo-data
      uses: actions/checkout@v6
      with:
        repository: jdolan/quetoo-data
        path: quetoo-data
        fetch-depth: 1
        sparse-checkout: target

    - name: Bundle game data
      run: make -C quetoo/apple bundle-data INSTALL=$(pwd)/arm64/Quetoo.app \
             QUETOO_DATA_DIR=$(pwd)/quetoo-data

    - name: Re-sign bundle
      run: |
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        make -C quetoo/apple bundle-sign INSTALL=$(pwd)/arm64/Quetoo.app

    - name: Create bundle DMG
      run: make -C quetoo/apple bundle-dmg INSTALL=$(pwd)/arm64/Quetoo.app \
             BUNDLE_SNAPSHOT=$(pwd)/quetoo-bundle-universal-apple-darwin.dmg

    - name: Notarize bundle DMG
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: make -C quetoo/apple bundle-notarize INSTALL=$(pwd)/arm64/Quetoo.app \
             BUNDLE_SNAPSHOT=$(pwd)/quetoo-bundle-universal-apple-darwin.dmg

    - name: Tear down keychain
      if: always()
      run: security delete-keychain build.keychain

    - name: Upload binary DMG artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-universal-apple-darwin
        path: quetoo-universal-apple-darwin.dmg

    - name: Upload bundle artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-bundle-universal-apple-darwin
        path: quetoo-bundle-universal-apple-darwin.dmg

  build-linux:
    needs: resolve-deps
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            build: x86_64-pc-linux
          - runner: ubuntu-22.04-arm
            build: aarch64-pc-linux

    runs-on: ${{ matrix.runner }}

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool pkg-config \
          libncurses-dev \
          libpcre2-dev libffi-dev \
          libopenal-dev libsndfile1-dev libphysfs-dev zlib1g-dev \
          libcurl4-openssl-dev \
          libgl-dev \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
          libxfixes-dev libxss-dev libxtst-dev libwayland-dev libxkbcommon-dev \
          libdrm-dev libgbm-dev libdecor-0-dev libasound2-dev \
          libfreetype-dev libharfbuzz-dev \
          check \
          cmake ninja-build python3-pip \
          imagemagick \
          ruby ruby-dev rubygems rpm
        sudo pip3 install meson
        sudo gem install fpm --no-document

    - name: Build GLib
      run: |
        curl -fsSL -o glib-2.88.0.tar.xz https://download.gnome.org/sources/glib/2.88/glib-2.88.0.tar.xz
        tar -xf glib-2.88.0.tar.xz
        meson setup glib-2.88.0/_build glib-2.88.0 \
          --prefix=/usr/local \
          --buildtype=release \
          -Dtests=false \
          -Dintrospection=disabled \
          -Ddocumentation=false
        ninja -C glib-2.88.0/_build -j$(nproc)
        sudo ninja -C glib-2.88.0/_build install

    - name: Build SDL3
      run: |
        git clone --depth 1 --branch release-3.4.2 https://github.com/libsdl-org/SDL.git SDL3
        cmake -S SDL3 -B SDL3/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3/build -j$(nproc)
        sudo cmake --install SDL3/build

    - name: Build SDL3_image
      run: |
        git clone --depth 1 --branch release-3.4.0 https://github.com/libsdl-org/SDL_image.git SDL3_image
        cmake -S SDL3_image -B SDL3_image/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3_image/build -j$(nproc)
        sudo cmake --install SDL3_image/build

    - name: Build SDL3_ttf
      run: |
        git clone --depth 1 --branch release-3.2.2 https://github.com/libsdl-org/SDL_ttf.git SDL3_ttf
        cmake -S SDL3_ttf -B SDL3_ttf/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3_ttf/build -j$(nproc)
        sudo cmake --install SDL3_ttf/build

    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Build Objectively
      working-directory: Objectively
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyMVC
        path: ObjectivelyMVC

    - name: Build ObjectivelyMVC
      working-directory: ObjectivelyMVC
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Refresh shared library cache
      run: sudo ldconfig

    - name: Checkout Quetoo
      uses: actions/checkout@v6
      with:
        path: quetoo
        fetch-depth: 0

    - name: Build Quetoo
      working-directory: quetoo
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure --with-version=$(git rev-list --count HEAD) CFLAGS='-g -O2' LDFLAGS='-Wl,-rpath=XORIGIN/../lib' --prefix=/
        make -j$(nproc)

    - name: Package Quetoo
      working-directory: quetoo/linux
      env:
        VERSION: ${{ github.event.inputs.version || github.ref_name }}
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        make archive deb rpm VERSION=${VERSION#v}

    - name: Upload archive artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-${{ matrix.build }}-archive
        path: quetoo/linux/target/quetoo-${{ matrix.build }}.tar.gz

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-${{ matrix.build }}-deb
        path: quetoo/linux/target/quetoo_*.deb

    - name: Upload .rpm artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-${{ matrix.build }}-rpm
        path: quetoo/linux/target/quetoo-*.rpm

  build-windows:
    needs: resolve-deps
    runs-on: windows-latest

    env:
      SOLUTION_FILE_PATH: Quetoo.vs15/quetoo_all.sln
      BUILD_CONFIGURATION: Release

    steps:
    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyMVC
        path: ObjectivelyMVC

    - name: Checkout Quetoo
      uses: actions/checkout@v6
      with:
        path: quetoo
        fetch-depth: 0

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Cache vcpkg installed packages
      id: cache-vcpkg
      uses: actions/cache@v5
      with:
        path: C:\vcpkg\installed
        key: vcpkg-x64-windows-glib-2.88.0

    - name: Install vcpkg packages
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: vcpkg install glib:x64-windows

    - name: Restore NuGet packages
      working-directory: ${{ github.workspace }}/quetoo
      run: nuget restore ${{ env.SOLUTION_FILE_PATH }}

    - name: Build
      working-directory: ${{ github.workspace }}/quetoo
      shell: pwsh
      run: |
        $version = (git rev-list --count HEAD).Trim()
        msbuild /m /p:Configuration=$env:BUILD_CONFIGURATION /p:DebugSymbols=true /p:DebugType=full "/p:ExtraPreprocessorDefinitions=VERSION=`"$version`"" $env:SOLUTION_FILE_PATH

    - name: Install Quetoo
      working-directory: ${{ github.workspace }}/quetoo
      run: |
        $staging = "windows\target\quetoo"
        $symbols = "windows\target\symbols"

        New-Item -ItemType Directory -Force -Path "$staging\bin" | Out-Null
        New-Item -ItemType Directory -Force -Path "$staging\lib\default\shaders" | Out-Null
        New-Item -ItemType Directory -Force -Path "$staging\lib\default\ui" | Out-Null
        New-Item -ItemType Directory -Force -Path "$symbols\bin" | Out-Null
        New-Item -ItemType Directory -Force -Path "$symbols\lib\default" | Out-Null

        # Executables
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo.exe" "$staging\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quemap.exe" "$staging\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo-dedicated.exe" "$staging\bin\"

        # Game modules
        Copy-Item "Quetoo.vs15\bin\x64Release\cgame.dll" "$staging\lib\default\"
        Copy-Item "Quetoo.vs15\bin\x64Release\game.dll" "$staging\lib\default\"
        Copy-Item "Quetoo.vs15\bin\x64Release\cgame.pdb" "$symbols\lib\default\"
        Copy-Item "Quetoo.vs15\bin\x64Release\game.pdb" "$symbols\lib\default\"

        # Objectively and ObjectivelyMVC
        Copy-Item "..\Objectively\Objectively.vs15\bin\x64Release\Objectively.dll" "$staging\bin\"
        Copy-Item "..\ObjectivelyMVC\ObjectivelyMVC.vs15\bin\x64Release\ObjectivelyMVC.dll" "$staging\bin\"

        # Symbol files
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo.pdb" "$symbols\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quemap.pdb" "$symbols\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo-dedicated.pdb" "$symbols\bin\"
        Copy-Item "..\Objectively\Objectively.vs15\bin\x64Release\Objectively.pdb" "$symbols\bin\"
        Copy-Item "..\ObjectivelyMVC\ObjectivelyMVC.vs15\bin\x64Release\ObjectivelyMVC.pdb" "$symbols\bin\"

        # Dependency DLLs
        Copy-Item "..\Objectively\Objectively.vs15\libs\dlfcn\x64\dlfcn.dll" "$staging\bin\"
        Copy-Item "Quetoo.vs15\libs\openal\bin\x64\OpenAL32.dll" "$staging\bin\"

        # GLib and its dependencies from vcpkg
        $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
        Copy-Item "$vcpkgBin\glib-2.0-0.dll" "$staging\bin\"
        Copy-Item "$vcpkgBin\intl-8.dll" "$staging\bin\"
        Copy-Item "$vcpkgBin\iconv-2.dll" "$staging\bin\"
        Copy-Item "$vcpkgBin\pcre2-8.dll" "$staging\bin\"

        # SDL3 DLLs
        Get-ChildItem "..\ObjectivelyMVC\ObjectivelyMVC.vs15\libs\sdl\lib\x64\*.dll" -ErrorAction SilentlyContinue |
          Copy-Item -Destination "$staging\bin\"

        # Shaders
        Copy-Item -Path "src\client\renderer\shaders\*" -Destination "$staging\lib\default\shaders\" -Recurse

        # UI files (CSS, JSON, PNG and WAV assets, preserving directory structure)
        foreach ($uiSource in @("src\cgame\default\ui", "src\client\ui")) {
          Get-ChildItem -Path $uiSource -Include "*.css","*.json","*.png","*.wav" -Recurse | ForEach-Object {
            $relativePath = $_.FullName.Substring((Resolve-Path $uiSource).Path.Length).TrimStart('\')
            $destPath = Join-Path "$staging\lib\default\ui" $relativePath
            $destDir = Split-Path $destPath -Parent
            if (-not (Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force | Out-Null }
            Copy-Item $_.FullName -Destination $destPath
          }
        }

    - name: Create archive
      working-directory: ${{ github.workspace }}/quetoo
      run: |
        Compress-Archive -Path windows\target\quetoo\* -DestinationPath quetoo-x86_64-pc-windows.zip
        Compress-Archive -Path windows\target\symbols\* -DestinationPath quetoo-x86_64-pc-windows-symbols.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-x86_64-pc-windows
        path: quetoo/quetoo-x86_64-pc-windows.zip

    - name: Upload symbols artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-x86_64-pc-windows-symbols
        path: quetoo/quetoo-x86_64-pc-windows-symbols.zip

  release:
    needs: [lipo-macos, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v8

    - name: Publish version to S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
      run: |
        git rev-list --count HEAD > version
        aws s3 cp version s3://quetoo/version

    - name: Checkout quetoo-data
      uses: actions/checkout@v6
      with:
        repository: jdolan/quetoo-data
        path: quetoo-data
        fetch-depth: 1
        sparse-checkout: target

    - name: Create bundles
      run: |
        # Linux bundle: extract archive, inject data into quetoo/share/quetoo/default/, repack
        mkdir -p quetoo-bundle-linux-x86_64
        tar xzf quetoo-x86_64-pc-linux-archive/quetoo-x86_64-pc-linux.tar.gz -C quetoo-bundle-linux-x86_64
        mkdir -p quetoo-bundle-linux-x86_64/quetoo/share/quetoo/default
        cp -r quetoo-data/target/default/. quetoo-bundle-linux-x86_64/quetoo/share/quetoo/default/
        tar czf quetoo-bundle-x86_64-pc-linux.tar.gz -C quetoo-bundle-linux-x86_64 quetoo/

        mkdir -p quetoo-bundle-linux-aarch64
        tar xzf quetoo-aarch64-pc-linux-archive/quetoo-aarch64-pc-linux.tar.gz -C quetoo-bundle-linux-aarch64
        mkdir -p quetoo-bundle-linux-aarch64/quetoo/share/quetoo/default
        cp -r quetoo-data/target/default/. quetoo-bundle-linux-aarch64/quetoo/share/quetoo/default/
        tar czf quetoo-bundle-aarch64-pc-linux.tar.gz -C quetoo-bundle-linux-aarch64 quetoo/

        # Windows bundle: data as share/default/ alongside bin/ and lib/
        mkdir bundle-windows && cd bundle-windows
        unzip ../quetoo-x86_64-pc-windows/quetoo-x86_64-pc-windows.zip
        mkdir -p share/default
        cp -r ../quetoo-data/target/default/. share/default/
        zip -r ../quetoo-bundle-x86_64-pc-windows.zip .
        cd ..

    - name: Upload Linux x86_64 bundle artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-bundle-x86_64-pc-linux
        path: quetoo-bundle-x86_64-pc-linux.tar.gz

    - name: Upload Windows bundle artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-bundle-x86_64-pc-windows
        path: quetoo-bundle-x86_64-pc-windows.zip

    - name: Create versioned release
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        VERSION: ${{ github.event.inputs.version || github.ref_name }}
      run: |
        cp quetoo-x86_64-pc-linux-deb/quetoo_*_amd64.deb quetoo-x86_64-pc-linux-deb/quetoo-x86_64-pc-linux.deb
        cp quetoo-x86_64-pc-linux-rpm/quetoo-*.x86_64.rpm quetoo-x86_64-pc-linux-rpm/quetoo-x86_64-pc-linux.rpm
        cp quetoo-aarch64-pc-linux-deb/quetoo_*_arm64.deb quetoo-aarch64-pc-linux-deb/quetoo-aarch64-pc-linux.deb
        cp quetoo-aarch64-pc-linux-rpm/quetoo-*.aarch64.rpm quetoo-aarch64-pc-linux-rpm/quetoo-aarch64-pc-linux.rpm

        prev_tag=$(git describe --tags --abbrev=0 "$VERSION^" 2>/dev/null || true)
        if [ -n "$prev_tag" ]; then
          changelog=$(git log "$prev_tag..$VERSION" --pretty=format:"- [\`%h\`](https://github.com/${{ github.repository }}/commit/%H) %s" --no-merges)
        else
          changelog=$(git log "$VERSION" --pretty=format:"- [\`%h\`](https://github.com/${{ github.repository }}/commit/%H) %s" --no-merges)
        fi

        notes=$(cat <<EOF
        ## Downloads

        | Platform | New Install | Update |
        |---|---|---|
        | Windows x86-64 | [quetoo-bundle-x86_64-pc-windows.zip](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-bundle-x86_64-pc-windows.zip) | [quetoo-x86_64-pc-windows.zip](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-x86_64-pc-windows.zip) |
        | Linux x86-64 | [quetoo-bundle-x86_64-pc-linux.tar.gz](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-bundle-x86_64-pc-linux.tar.gz) | [quetoo-x86_64-pc-linux.tar.gz](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-x86_64-pc-linux.tar.gz) |
        | Linux arm64 | [quetoo-bundle-aarch64-pc-linux.tar.gz](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-bundle-aarch64-pc-linux.tar.gz) | [quetoo-aarch64-pc-linux.tar.gz](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-aarch64-pc-linux.tar.gz) |
        | macOS Universal | [quetoo-bundle-universal-apple-darwin.dmg](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-bundle-universal-apple-darwin.dmg) | [quetoo-universal-apple-darwin.dmg](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-universal-apple-darwin.dmg) |

        Windows debugging symbols: [quetoo-x86_64-pc-windows-symbols.zip](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-x86_64-pc-windows-symbols.zip)

        ## Linux Dedicated Server Packages

        | Package | x86-64 | arm64 |
        |---|---|---|
        | .deb | [quetoo-x86_64-pc-linux.deb](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-x86_64-pc-linux.deb) | [quetoo-aarch64-pc-linux.deb](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-aarch64-pc-linux.deb) |
        | .rpm | [quetoo-x86_64-pc-linux.rpm](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-x86_64-pc-linux.rpm) | [quetoo-aarch64-pc-linux.rpm](https://github.com/${{ github.repository }}/releases/download/$VERSION/quetoo-aarch64-pc-linux.rpm) |

        > .deb and .rpm are for **dedicated servers only** — not for game clients. Also install the matching [quetoo-data $VERSION](https://github.com/jdolan/quetoo-data/releases/tag/$VERSION) release.

        ## Changelog

        $changelog
        EOF
        )

        assets=(
          quetoo-bundle-universal-apple-darwin/quetoo-bundle-universal-apple-darwin.dmg
          quetoo-bundle-x86_64-pc-linux.tar.gz
          quetoo-bundle-aarch64-pc-linux.tar.gz
          quetoo-bundle-x86_64-pc-windows.zip
          quetoo-universal-apple-darwin/quetoo-universal-apple-darwin.dmg
          quetoo-x86_64-pc-linux-archive/quetoo-x86_64-pc-linux.tar.gz
          quetoo-x86_64-pc-linux-deb/quetoo-x86_64-pc-linux.deb
          quetoo-x86_64-pc-linux-rpm/quetoo-x86_64-pc-linux.rpm
          quetoo-aarch64-pc-linux-archive/quetoo-aarch64-pc-linux.tar.gz
          quetoo-aarch64-pc-linux-deb/quetoo-aarch64-pc-linux.deb
          quetoo-aarch64-pc-linux-rpm/quetoo-aarch64-pc-linux.rpm
          quetoo-x86_64-pc-windows/quetoo-x86_64-pc-windows.zip
          quetoo-x86_64-pc-windows-symbols/quetoo-x86_64-pc-windows-symbols.zip
        )

        if gh release view "$VERSION" >/dev/null 2>&1; then
          gh release edit "$VERSION" --title "Quetoo $VERSION" --notes "$notes"
          gh release upload "$VERSION" --clobber "${assets[@]}"
        else
          gh release create "$VERSION" --title "Quetoo $VERSION" --notes "$notes" "${assets[@]}"
        fi

  publish-itch:
    needs: release
    runs-on: ubuntu-latest

    steps:
    - name: Download macOS bundle
      uses: actions/download-artifact@v8
      with:
        name: quetoo-bundle-universal-apple-darwin
        path: itch/mac

    - name: Download Linux x86_64 bundle
      uses: actions/download-artifact@v8
      with:
        name: quetoo-bundle-x86_64-pc-linux
        path: itch/linux

    - name: Download Windows bundle
      uses: actions/download-artifact@v8
      with:
        name: quetoo-bundle-x86_64-pc-windows
        path: itch/windows

    - name: Install Butler
      run: |
        curl --fail --location --retry 5 --retry-all-errors \
          -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
        unzip butler.zip
        chmod +x butler

    - name: Push to itch.io
      env:
        BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        VERSION: ${{ github.event.inputs.version || github.ref_name }}
      run: |
        ./butler push itch/mac/quetoo-bundle-universal-apple-darwin.dmg    wickedoldgames/quetoo:mac     --userversion $VERSION
        ./butler push itch/linux/quetoo-bundle-x86_64-pc-linux.tar.gz      wickedoldgames/quetoo:linux   --userversion $VERSION
        ./butler push itch/windows/quetoo-bundle-x86_64-pc-windows.zip     wickedoldgames/quetoo:windows --userversion $VERSION
