name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  resolve-deps:
    runs-on: ubuntu-latest
    outputs:
      objectively-sha: ${{ steps.resolve.outputs.objectively-sha }}
      objectivelymvc-sha: ${{ steps.resolve.outputs.objectivelymvc-sha }}
    steps:
    - name: Resolve dependency versions
      id: resolve
      run: |
        echo "objectively-sha=$(git ls-remote https://github.com/jdolan/Objectively.git HEAD | cut -f1)" >> $GITHUB_OUTPUT
        echo "objectivelymvc-sha=$(git ls-remote https://github.com/jdolan/ObjectivelyMVC.git HEAD | cut -f1)" >> $GITHUB_OUTPUT

  build-linux:
    needs: resolve-deps
    runs-on: ubuntu-22.04

    steps:
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential autoconf automake libtool pkg-config \
          g++-12 \
          libncurses-dev \
          libpcre2-dev libffi-dev \
          libsndfile1-dev libphysfs-dev zlib1g-dev \
          libcurl4-openssl-dev \
          libgl-dev \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
          libxfixes-dev libxss-dev libxtst-dev libwayland-dev libxkbcommon-dev \
          libdrm-dev libgbm-dev libdecor-0-dev libasound2-dev \
          libfreetype-dev libharfbuzz-dev \
          check \
          cmake ninja-build python3-pip \
          imagemagick \
          ruby ruby-dev rubygems rpm
        sudo pip3 install meson
        sudo gem install fpm --no-document

    - name: Build OpenAL Soft
      run: |
        git clone --depth 1 --branch 1.25.2 https://github.com/kcat/openal-soft.git openal-soft
        cmake -S openal-soft -B openal-soft/build \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DCMAKE_CXX_COMPILER=g++-12 \
          -DALSOFT_EXAMPLES=OFF \
          -DALSOFT_TESTS=OFF \
          -DALSOFT_UTILS=OFF
        cmake --build openal-soft/build -j$(nproc)
        sudo cmake --install openal-soft/build

    - name: Build GLib
      run: |
        curl -fsSL -o glib-2.88.0.tar.xz https://download.gnome.org/sources/glib/2.88/glib-2.88.0.tar.xz
        tar -xf glib-2.88.0.tar.xz
        meson setup glib-2.88.0/_build glib-2.88.0 \
          --prefix=/usr/local \
          --buildtype=release \
          -Dtests=false \
          -Dintrospection=disabled \
          -Ddocumentation=false
        ninja -C glib-2.88.0/_build -j$(nproc)
        sudo ninja -C glib-2.88.0/_build install

    - name: Build SDL3
      run: |
        git clone --depth 1 --branch release-3.4.8 https://github.com/libsdl-org/SDL.git SDL3
        cmake -S SDL3 -B SDL3/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3/build -j$(nproc)
        sudo cmake --install SDL3/build

    - name: Build SDL3_image
      run: |
        git clone --depth 1 --branch release-3.4.4 https://github.com/libsdl-org/SDL_image.git SDL3_image
        cmake -S SDL3_image -B SDL3_image/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3_image/build -j$(nproc)
        sudo cmake --install SDL3_image/build

    - name: Build SDL3_ttf
      run: |
        git clone --depth 1 --branch release-3.2.2 https://github.com/libsdl-org/SDL_ttf.git SDL3_ttf
        cmake -S SDL3_ttf -B SDL3_ttf/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build SDL3_ttf/build -j$(nproc)
        sudo cmake --install SDL3_ttf/build

    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Build Objectively
      working-directory: Objectively
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyMVC
        path: ObjectivelyMVC

    - name: Build ObjectivelyMVC
      working-directory: ObjectivelyMVC
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure
        make -j$(nproc)
        sudo make install

    - name: Refresh shared library cache
      run: sudo ldconfig

    - name: Checkout Quetoo
      uses: actions/checkout@v6
      with:
        path: quetoo
        fetch-depth: 0

    - name: Build Quetoo
      working-directory: quetoo
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        autoreconf -i
        ./configure --with-version=$(git rev-list --count HEAD) --enable-optimizations LDFLAGS='-Wl,-rpath=XORIGIN/../lib' --prefix=/
        make -j$(nproc)

    - name: Package Quetoo
      working-directory: quetoo/linux
      run: |
        export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:${PKG_CONFIG_PATH}"
        make archive deb rpm

    - name: Upload symbols artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-x86_64-pc-linux-symbols
        path: |
          quetoo/linux/target/staging/bin/quetoo
          quetoo/linux/target/staging/bin/quetoo-dedicated

    - name: Upload archive artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-x86_64-pc-linux-archive
        path: quetoo/linux/target/quetoo-x86_64-pc-linux.tar.gz

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-x86_64-pc-linux-deb
        path: quetoo/linux/target/quetoo_*_amd64.deb

    - name: Upload .rpm artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-x86_64-pc-linux-rpm
        path: quetoo/linux/target/quetoo-*.x86_64.rpm

  build-windows:
    needs: resolve-deps
    runs-on: windows-latest

    env:
      SOLUTION_FILE_PATH: Quetoo.vs15/quetoo_all.sln
      BUILD_CONFIGURATION: Release

    steps:
    - name: Checkout Objectively
      uses: actions/checkout@v6
      with:
        repository: jdolan/Objectively
        path: Objectively

    - name: Checkout ObjectivelyMVC
      uses: actions/checkout@v6
      with:
        repository: jdolan/ObjectivelyMVC
        path: ObjectivelyMVC

    - name: Checkout Quetoo
      uses: actions/checkout@v6
      with:
        path: quetoo
        fetch-depth: 0

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Cache vcpkg installed packages
      id: cache-vcpkg
      uses: actions/cache@v5
      with:
        path: C:\vcpkg\installed
        key: vcpkg-x64-windows-glib-2.88.0

    - name: Install vcpkg packages
      if: steps.cache-vcpkg.outputs.cache-hit != 'true'
      run: vcpkg install glib:x64-windows

    - name: Restore NuGet packages
      working-directory: ${{ github.workspace }}/quetoo
      run: nuget restore ${{ env.SOLUTION_FILE_PATH }}

    - name: Build
      working-directory: ${{ github.workspace }}/quetoo
      shell: pwsh
      run: |
        $version = (git rev-list --count HEAD).Trim()
        msbuild /m /p:Configuration=$env:BUILD_CONFIGURATION /p:DebugSymbols=true /p:DebugType=full "/p:ExtraPreprocessorDefinitions=VERSION=`"$version`"" $env:SOLUTION_FILE_PATH

    - name: Install Quetoo
      working-directory: ${{ github.workspace }}/quetoo
      run: |
        $staging = "windows\target\quetoo"

        New-Item -ItemType Directory -Force -Path "$staging\bin" | Out-Null
        New-Item -ItemType Directory -Force -Path "$staging\lib\default\shaders" | Out-Null
        New-Item -ItemType Directory -Force -Path "$staging\lib\default\ui" | Out-Null

        # Executables and their PDBs
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo.exe" "$staging\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo.pdb" "$staging\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quemap.exe" "$staging\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quemap.pdb" "$staging\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo-dedicated.exe" "$staging\bin\"
        Copy-Item "Quetoo.vs15\bin\x64Release\quetoo-dedicated.pdb" "$staging\bin\"

        # Game modules and their PDBs
        Copy-Item "Quetoo.vs15\bin\x64Release\cgame.dll" "$staging\lib\default\"
        Copy-Item "Quetoo.vs15\bin\x64Release\cgame.pdb" "$staging\lib\default\"
        Copy-Item "Quetoo.vs15\bin\x64Release\game.dll" "$staging\lib\default\"
        Copy-Item "Quetoo.vs15\bin\x64Release\game.pdb" "$staging\lib\default\"

        # Objectively and ObjectivelyMVC and their PDBs
        Copy-Item "..\Objectively\Objectively.vs15\bin\x64Release\Objectively.dll" "$staging\bin\"
        Copy-Item "..\Objectively\Objectively.vs15\bin\x64Release\Objectively.pdb" "$staging\bin\"
        Copy-Item "..\ObjectivelyMVC\ObjectivelyMVC.vs15\bin\x64Release\ObjectivelyMVC.dll" "$staging\bin\"
        Copy-Item "..\ObjectivelyMVC\ObjectivelyMVC.vs15\bin\x64Release\ObjectivelyMVC.pdb" "$staging\bin\"

        # Dependency DLLs
        Copy-Item "..\Objectively\Objectively.vs15\libs\dlfcn\x64\dlfcn.dll" "$staging\bin\"
        Copy-Item "Quetoo.vs15\libs\openal\bin\x64\OpenAL32.dll" "$staging\bin\"

        # GLib and its dependencies from vcpkg
        $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
        Copy-Item "$vcpkgBin\glib-2.0-0.dll" "$staging\bin\"
        Copy-Item "$vcpkgBin\intl-8.dll" "$staging\bin\"
        Copy-Item "$vcpkgBin\iconv-2.dll" "$staging\bin\"
        Copy-Item "$vcpkgBin\pcre2-8.dll" "$staging\bin\"

        # SDL3 DLLs
        Get-ChildItem "..\ObjectivelyMVC\ObjectivelyMVC.vs15\libs\sdl\lib\x64\*.dll" -ErrorAction SilentlyContinue |
          Copy-Item -Destination "$staging\bin\"

        # Shaders
        Copy-Item -Path "src\client\renderer\shaders\*" -Destination "$staging\lib\default\shaders\" -Recurse

        # UI files (CSS, JSON, PNG and WAV assets, preserving directory structure)
        foreach ($uiSource in @("src\cgame\default\ui", "src\client\ui")) {
          Get-ChildItem -Path $uiSource -Include "*.css","*.json","*.png","*.wav" -Recurse | ForEach-Object {
            $relativePath = $_.FullName.Substring((Resolve-Path $uiSource).Path.Length).TrimStart('\')
            $destPath = Join-Path "$staging\lib\default\ui" $relativePath
            $destDir = Split-Path $destPath -Parent
            if (-not (Test-Path $destDir)) { New-Item -ItemType Directory -Path $destDir -Force | Out-Null }
            Copy-Item $_.FullName -Destination $destPath
          }
        }

    - name: Create archive
      working-directory: ${{ github.workspace }}/quetoo
      run: |
        Compress-Archive -Path windows\target\quetoo\* -DestinationPath quetoo-x86_64-pc-windows.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: quetoo-x86_64-pc-windows
        path: quetoo/quetoo-x86_64-pc-windows.zip

  release:
    needs: [build-linux, build-windows]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v8

    - name: Publish version to S3
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
      run: |
        git rev-list --count HEAD > version
        aws s3 cp version s3://quetoo/version

    - name: Delete existing snapshot release
      if: github.ref == 'refs/heads/main'
      run: gh release delete latest --yes --cleanup-tag || true
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}

    - name: Create snapshot release
      if: github.ref == 'refs/heads/main'
      run: |
        gh release create latest \
          --title "Quetoo Snapshot" \
          --notes "Latest snapshot build from the \`main\` branch.

        | Platform | Download |
        |----------|----------|
        | Linux (x86_64) | quetoo-x86_64-pc-linux.tar.gz |
        | Windows (x86_64) | quetoo-x86_64-pc-windows.zip |" \
          --prerelease \
          quetoo-x86_64-pc-linux-archive/quetoo-x86_64-pc-linux.tar.gz \
          quetoo-x86_64-pc-windows/quetoo-x86_64-pc-windows.zip
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
